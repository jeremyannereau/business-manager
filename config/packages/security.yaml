security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # ── Firewall API mobile (JWT) ─────────────────────────────────────
        # Routes /api/auth/login et /api/auth/me — authentification par token
        api:
            pattern: ^/api
            stateless: true   # pas de session, le JWT suffit
            jwt: ~            # utilise LexikJWTAuthenticationBundle

        # ── Firewall web (session + form login) ───────────────────────────
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\LoginFormAuthenticator
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    access_control:
        - { path: ^/manifest.json,      roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/login,     roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/logout,    roles: PUBLIC_ACCESS }
        - { path: ^/api,                roles: ROLE_USER }
        - { path: ^/login,              roles: PUBLIC_ACCESS }
        - { path: ^/register,           roles: PUBLIC_ACCESS }
        - { path: ^/,                   roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
