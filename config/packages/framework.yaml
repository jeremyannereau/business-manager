framework:
    secret: '%env(APP_SECRET)%'

    session:
        # SameSite=none permet à la WebView Capacitor d'envoyer le cookie
        # sur les requêtes cross-origin (app mobile → API Symfony)
        # En production HTTPS, ajouter secure: true
        cookie_samesite: 'none'
        cookie_secure: false    # passer à true en production HTTPS
        cookie_httponly: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
